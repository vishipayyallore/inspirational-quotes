# Link-check the maintained documentation surface. Archived, staging, logs, and
# local dependency folders are intentionally excluded in the workflow globs.
accept = ["200", "204", "206", "429"]
max_retries = 3
timeout = 20
no_progress = true
verbose = "info"

exclude = [
  "^mailto:",
  "^tel:"
]

exclude_path = [
  ".archive",
  ".clinerules",
  ".opencode",
  "Logs",
  "staging"
]
